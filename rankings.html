<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rankings | Ruins de Roda</title>
    <meta name="description" content="Tabelas de ranking da Serie A ate Serie G do servidor de F1." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body data-page="rankings">
    <header class="page-hero">
      <nav class="topbar" aria-label="Navegacao principal">
        <a class="brand" href="index.html" aria-label="Ruins de Roda inicio"><span class="brand-mark">F1</span><span>Ruins de Roda</span></a>
        <div class="nav-links">
          <a href="rankings.html" data-nav="rankings">Rankings</a>
          <a href="corridas.html" data-nav="corridas">Corridas</a>
          <a href="noticias.html" data-nav="noticias">Noticias</a>
          <a href="lives.html" data-nav="lives">Lives</a>
          <a href="regras.html" data-nav="regras">Regras</a>
        </div>
      </nav>
      <div class="page-title">
        <p class="eyebrow">Classificacao</p>
        <h1>Rankings</h1>
        <p>Tabelas da Serie A ate Serie G, com ranking de pilotos e construtores.</p>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="ranking-toolbar">
          <div class="series-tabs" id="seriesTabs" role="tablist" aria-label="Series"></div>
          <div class="ranking-mode" aria-label="Tipo de ranking">
            <button class="active" type="button" data-ranking-mode="drivers">Pilotos</button>
            <button type="button" data-ranking-mode="constructors">Construtores</button>
          </div>
        </div>
        <div class="ranking-shell">
          <div class="ranking-header">
            <h3 id="activeSeriesTitle">Serie A</h3>
            <p id="activeSeriesInfo">Carregando classificacao...</p>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Pos</th>
                  <th id="rankingNameHeader">Piloto</th>
                  <th id="rankingDetailHeader">Equipe</th>
                  <th>Pontos</th>
                  <th>Vitorias</th>
                  <th>Podios</th>
                </tr>
              </thead>
              <tbody id="rankingBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>Ruins de Roda. Atualize os dados em <code>data.js</code>.</p>
      <a href="index.html">Voltar para inicio</a>
    </footer>

    <script src="data.js?v=4"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
